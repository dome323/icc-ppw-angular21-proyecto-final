<header class="w-full bg-slate-950 border-b border-slate-800 text-white sticky top-0 z-50">
  <div class="mx-auto max-w-7xl flex items-center justify-between px-8 py-4">
    
    <a routerLink="/" class="text-xl font-bold tracking-wider hover:text-pink-400 transition">
      DevPortfolio<span class="text-pink-400">.</span>
    </a>

    <nav class="hidden md:flex items-center gap-8">
      <a routerLink="/" class="text-sm font-medium text-slate-300 hover:text-white transition">Inicio</a>
      <a routerLink="/proyectos" class="text-sm font-medium text-slate-300 hover:text-white transition">Proyectos</a>
    </nav>

    <div class="flex items-center gap-4">
      @if (usuarioLogueado) {
        <span class="text-xs text-slate-400 hidden lg:inline-block bg-slate-900 border border-slate-800 px-3 py-1 rounded-full">
          {{ usuarioLogueado.email }}
        </span>
        <button 
          (click)="onLogout()" 
          class="px-4 py-2 bg-red-500 hover:bg-red-400 text-white rounded-xl font-semibold text-xs transition cursor-pointer shadow-md active:scale-95">
          Cerrar Sesión
        </button>
      } @else {
        <a 
          routerLink="/login" 
          class="px-4 py-2 bg-pink-500 hover:bg-pink-400 text-white rounded-xl font-semibold text-xs transition cursor-pointer shadow-lg active:scale-95">
          Ingresar
        </a>
      }
    </div>

  </div>
</header>
