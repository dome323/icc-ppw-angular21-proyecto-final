<app-header></app-header>

<section class="min-h-screen bg-slate-950 text-white px-8 py-24">

  <div class="max-w-7xl mx-auto">

    <h2 class="text-4xl font-bold mb-4 text-center">
      Nuestros <span class="text-pink-400">Proyectos</span>
    </h2>

    <p class="text-center text-green-400 mb-10">
      Total proyectos: {{ proyectos.length }}
    </p>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

      <a
        *ngFor="let proyecto of proyectos"
        [routerLink]="['/proyectos', proyecto.slug]"
        class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden p-6 block hover:border-pink-500 transition"
      >

        <h3 class="text-xl font-bold mb-3">
          {{ proyecto.nombre }}
        </h3>

      <img
        [src]="'http://localhost:1337' + proyecto.imagen[0].url"
        [alt]="proyecto.nombre"
        class="w-full rounded-2xl my-8"
      />

        <p class="text-slate-400 mb-4">
          {{ proyecto.descripcionBreve }}
        </p>

        <div class="flex gap-2">

          <span
            class="px-3 py-1 bg-pink-500/10 text-pink-400 text-xs rounded-full"
          >
            {{ proyecto.tecnologias }}
          </span>

        </div>

      </a>

    </div>

  </div>

</section>

<app-footer></app-footer>
