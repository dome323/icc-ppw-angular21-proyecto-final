<section class="min-h-screen bg-slate-950 text-white flex flex-col justify-center items-center px-4">
  <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl w-full max-w-md shadow-2xl">
    
    <h2 class="text-3xl font-black text-center mb-2">Crea tu <span class="text-pink-400">cuenta</span></h2>
    <p class="text-slate-400 text-center text-sm mb-8">Regístrate para empezar a usar la plataforma</p>

    <form autocomplete="off" class="flex flex-col gap-5">
      
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Correo Electrónico</label>
        <input 
          type="email" 
          [(ngModel)]="email" 
          name="email" 
          required
          class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none"
          placeholder="ejemplo@correo.com">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Contraseña</label>
        <input 
          type="password" 
          [(ngModel)]="password" 
          name="password" 
          required
          class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none"
          placeholder="Mínimo 6 caracteres">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Confirmar Contraseña</label>
        <input 
          type="password" 
          [(ngModel)]="confirmPassword" 
          name="confirmPassword" 
          required
          class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none"
          placeholder="Repite tu contraseña">
      </div>

      <button 
        type="button" 
        (click)="onRegister()" 
        class="w-full bg-pink-500 hover:bg-pink-400 font-semibold py-3 rounded-xl transition mt-2">
        Registrarse
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-slate-400">
      ¿Ya tienes una cuenta? <a routerLink="/login" class="text-pink-400 hover:underline">Inicia sesión aquí</a>
    </p>
  </div>
</section>
