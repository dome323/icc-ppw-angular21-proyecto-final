<app-header></app-header>

<section class="page-shell min-h-screen py-20 px-6 overflow-hidden">
  <div class="page-glow"></div>
  <div class="max-w-7xl mx-auto relative">

    <header class="section-header mb-12 text-center">
      <span class="section-label">{{ 'programadores.section' | transloco }}</span>
      <h1 class="section-title">{{ 'programadores.title' | transloco }}</h1>
      <div class="stat-badge">{{ 'programadores.total' | transloco: { count: programadores.length } }}</div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <a
        *ngFor="let programador of programadores"
        [routerLink]="['/programadores', programador.slug]"
        class="holo-card group"
        appTilt
      >
        <div class="card-deco"></div>

        <div class="card-top">
          <div class="avatar-ring">
            <img
              [src]="'http://localhost:1337' + programador.foto.url"
              [alt]="programador.nombre"
              class="avatar"
            />
          </div>
          <div class="card-heading">
            <h2>{{ programador.nombre }}</h2>
            <p class="subtitle">{{ programador.especialidad }}</p>
          </div>
        </div>

        <p class="description">{{ programador.descripcionBreve }}</p>

        <div class="tags-row">
          <span class="tag">Holo Card</span>
          <span class="tag">Glassmorphism</span>
          <span class="tag">Premium</span>
        </div>
      </a>
    </div>
  </div>
</section>

<app-footer></app-footer>
